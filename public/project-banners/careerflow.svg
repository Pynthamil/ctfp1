<svg width="594" height="594" viewBox="0 0 594 594" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="594" y2="594" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="100" y1="100" x2="494" y2="494" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1F2937" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="594" height="594" fill="url(#bg-grad)" />
  
  <!-- Glowing background elements -->
  <circle cx="297" cy="200" r="180" fill="#6366F1" opacity="0.12" filter="url(#glow)" />
  <circle cx="150" cy="450" r="130" fill="#EC4899" opacity="0.08" filter="url(#glow)" />

  <!-- App Shell Header -->
  <rect x="47" y="47" width="500" height="500" rx="16" fill="#111827" stroke="#1F2937" stroke-width="1.5" />
  
  <!-- Window Controls -->
  <circle cx="80" cy="77" r="6" fill="#EF4444" />
  <circle cx="98" cy="77" r="6" fill="#F59E0B" />
  <circle cx="116" cy="77" r="6" fill="#10B981" />
  
  <!-- Header Title / Address Bar -->
  <rect x="150" y="65" width="294" height="24" rx="12" fill="#1F2937" opacity="0.8" />
  <text x="297" y="81" fill="#9CA3AF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.5">careerflow.dev/dashboard</text>

  <!-- Main Grid / Columns -->
  <!-- Column 1: Wishlist -->
  <rect x="72" y="120" width="136" height="390" rx="10" fill="#151D30" opacity="0.5" stroke="#1F2937" stroke-width="1" />
  <text x="84" y="145" fill="#E5E7EB" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600">Wishlist (3)</text>
  
  <!-- Column 1 Cards -->
  <rect x="80" y="162" width="120" height="65" rx="8" fill="url(#card-grad)" stroke="#374151" stroke-width="1" />
  <text x="92" y="182" fill="#F3F4F6" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold">Frontend Eng</text>
  <text x="92" y="196" fill="#9CA3AF" font-family="-apple-system, sans-serif" font-size="9">Stripe</text>
  <rect x="92" y="206" width="35" height="12" rx="6" fill="#312E81" />
  <text x="110" y="215" fill="#C7D2FE" font-family="-apple-system, sans-serif" font-size="8" text-anchor="middle">$140k</text>

  <rect x="80" y="237" width="120" height="65" rx="8" fill="url(#card-grad)" stroke="#374151" stroke-width="1" />
  <text x="92" y="257" fill="#F3F4F6" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold">Software Eng</text>
  <text x="92" y="271" fill="#9CA3AF" font-family="-apple-system, sans-serif" font-size="9">Vercel</text>

  <!-- Column 2: Applied -->
  <rect x="229" y="120" width="136" height="390" rx="10" fill="#151D30" opacity="0.5" stroke="#1F2937" stroke-width="1" />
  <text x="241" y="145" fill="#E5E7EB" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600">Applied (4)</text>

  <!-- Column 2 Cards -->
  <rect x="237" y="162" width="120" height="65" rx="8" fill="url(#card-grad)" stroke="#6366F1" stroke-width="1.5" />
  <text x="249" y="182" fill="#F3F4F6" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold">Fullstack Eng</text>
  <text x="249" y="196" fill="#9CA3AF" font-family="-apple-system, sans-serif" font-size="9">Supabase</text>
  <!-- Indicator dot -->
  <circle cx="338" cy="180" r="4" fill="#6366F1" />

  <rect x="237" y="237" width="120" height="65" rx="8" fill="url(#card-grad)" stroke="#374151" stroke-width="1" />
  <text x="249" y="257" fill="#F3F4F6" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold">Security Eng</text>
  <text x="249" y="271" fill="#9CA3AF" font-family="-apple-system, sans-serif" font-size="9">Cloudflare</text>

  <!-- Column 3: Interviews -->
  <rect x="386" y="120" width="136" height="390" rx="10" fill="#151D30" opacity="0.5" stroke="#1F2937" stroke-width="1" />
  <text x="398" y="145" fill="#E5E7EB" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600">Interview (2)</text>

  <!-- Column 3 Cards -->
  <rect x="394" y="162" width="120" height="65" rx="8" fill="url(#card-grad)" stroke="#10B981" stroke-width="1" />
  <text x="406" y="182" fill="#F3F4F6" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold">UI/UX Dev</text>
  <text x="406" y="196" fill="#9CA3AF" font-family="-apple-system, sans-serif" font-size="9">Figma</text>
  <rect x="406" y="206" width="45" height="12" rx="6" fill="#064E3B" />
  <text x="428" y="215" fill="#A7F3D0" font-family="-apple-system, sans-serif" font-size="8" text-anchor="middle">Technical</text>

  <!-- Flow Arrows or decorative curves in background -->
  <path d="M 180 380 Q 297 420 414 380" fill="none" stroke="url(#accent-grad)" stroke-width="2" stroke-dasharray="4 4" opacity="0.6" />

  <!-- Logo and Branding Overlay -->
  <rect x="180" y="440" width="234" height="46" rx="8" fill="#1E293B" stroke="url(#accent-grad)" stroke-width="1.5" />
  
  <text x="297" y="468" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="1">
    CAREER<tspan fill="#6366F1">FLOW</tspan>
  </text>
</svg>
